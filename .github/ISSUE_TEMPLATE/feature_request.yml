name: Feature request
description: Propose an enhancement or new capability
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe expected behavior and user flow
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope impact
      description: Which module(s) are affected?
      placeholder: audio / inference / iot / button / light / docs / ci

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List measurable criteria to consider this done
      placeholder: |
        - [ ] ...
        - [ ] ...
